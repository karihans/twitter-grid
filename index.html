<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- YENİ: Izgara için sarmalayıcı div -->
    <div id="grid-wrapper">
        <!-- YENİ: Izgaranın kendisi için konteyner -->
        <div id="grid-container">
            <!-- Izgara JavaScript tarafından buraya eklenecek -->
        </div>
    </div>

    <!-- EYLEM ÇUBUĞU (Artık ızgaranın dışında ) -->
    <div id="action-bar">
        <div class="action-bar-content">
            <div id="sold-counter" class="counter-styles">
                <span class="counter-label">SATILAN</span>
                <span id="sold-count">...</span> / 40000
            </div>
            <div class="input-group">
                <input type="text" id="twitter-username" placeholder="Twitter Kullanıcı Adı">
            </div>
            <button id="purchase-button" class="glow-on-hover">
                <span class="button-text">KARENİ AL</span>
            </button>
        </div>
    </div>

    <!-- ONAY MODAL PENCERESİ -->
    <div id="confirmation-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="modal-title">Satın Almayı Onayla</h2>
            <p>Seçtiğin kareyi duvarına eklemek üzeresin. Ödemeyi tamamla ve işlemi onayla.</p>
            <div class="payment-info">
                <p><strong>Kare ID:</strong> <span id="modal-square-id"></span></p>
                <p><strong>Twitter:</strong> <span id="modal-twitter-username"></span></p>
                <hr>
                <p><strong>Ödenecek Tutar:</strong> <span id="payment-amount">...</span></p>
                <p><strong>Cüzdan Adresi:</strong> <span>[SENİN_SOLANA_CUZDAN_ADRESİN]</span></p>
            </div>
            <div class="form-group">
                <label for="transaction-id">İşlem Kimliği (TX ID)</label>
                <input type="text" id="transaction-id" placeholder="Ödeme sonrası aldığın işlem kimliği">
            </div>
            <div class="modal-buttons">
                <button id="submit-purchase" class="glow-on-hover">DUVARA EKLE</button>
                <button id="close-modal">İPTAL</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
